<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MegaMart</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/style_banner.css">
    <link rel="stylesheet" href="styles/style_product.css">
</head>
<body>
    <header class="header">
  <div class="header-inner">
    <div class="logo">MegaMart</div>


    <div class="right-block"> <!-- Блок для иконок справа -->
        <div class="search">
            <input type="text" placeholder="Поиск товаров...">
        </div>
        <div class="user-links">
            <a href="#" class="auth-btn">
            <img src="images/ikona_SingUp.png" alt="Sing Up/Sing In" class="icon-user">
            <span class="auth-text">Sing Up/Sing In</span>
            </a>
        </div>
        <div class="divider"></div>
        <div class="cart">
            <a href="#" class="cart-btn">
            <img src="images/ikona_Cart.png" alt="Корзина" class="icon-cart">
            <span class="cart-text">Cart</span>
            </a>
        </div>
        </div>
    </div>
</header>

    <!-- 2. Баннеры / реклама товаров -->
   <section class="banner-slider">
        <!-- Блок <div class="slides"> удалён -->

        <img src="images/banner_1.jpg" alt="Баннер 1" class="slide active">
        <img src="images/banner_2.jpg" alt="Баннер 2" class="slide">

        <!-- Кнопки остаются на своих местах -->
        <button class="prev-btn">❮</button>
        <button class="next-btn">❯</button>
    </section>

    <!-- 3. Товары -->
    <section class="products">
        <div class="product-card">Товар 1</div>
        <div class="product-card">Товар 2</div>
        <div class="product-card">Товар 3</div>
        <div class="product-card">Товар 4</div>
    </section>
     <script src="js/slider.js"></script>
</body>
</html>
