<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ФИНАЛЬНЫЙ ТЕСТ</title>
    <!-- Весь CSS будет здесь -->
    <style>
        /* --- CSS из style_banner.css (исправленный) --- */
        /* Баннер‑слайдер */
        .banner-slider {
            position: relative;
            width: 100%;
            max-width: 1200px;
            margin: 20px auto;
            overflow: hidden;
            border-radius: 10px;
            background-color: #f0f8ff; /* Голубой фон, чтобы видеть границы */
            min-height: 420px; /* Чтобы кнопки не вылезали */
        }

        /* 1. Скрываем все слайды по умолчанию */
        .banner-slider .slides .slide {
            display: none;
        }

        /* 2. Показываем активный слайд */
        .banner-slider .slides .slide.active {
            display: block;
        }

        /* 3. Стили для изображений */
        .banner-slider img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            display: block;
        }

        /* Кнопки */
        .banner-slider .prev-btn,
        .banner-slider .next-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.6); /* Чуть темнее */
            color: white;
            border: none;
            padding: 12px 18px; /* Чуть больше */
            font-size: 24px; /* Чуть крупнее */
            cursor: pointer;
            border-radius: 50%;
            z-index: 10;
            transition: background 0.3s; /* Эффект при наведении */
        }

        .banner-slider .prev-btn {
            left: 20px;
        }

        .banner-slider .next-btn {
            right: 20px;
        }

        .banner-slider .prev-btn:hover,
        .banner-slider .next-btn:hover {
            background: rgba(0, 0, 0, 0.9);
        }

    </style>
</head>
<body>

    <h1 style="text-align:center;">ФИНАЛЬНЫЙ ТЕСТ СЛАЙДЕРА</h1>

    <section class="banner-slider">
        <div class="slides">
            <img src="https://via.placeholder.com/1200x400/FF6347/FFFFFF?text=Слайд+1" alt="Слайд 1" class="slide active">
            <img src="https://via.placeholder.com/1200x400/4682B4/FFFFFF?text=Слайд+2" alt="Слайд 2" class="slide">
            <img src="https://via.placeholder.com/1200x400/32CD32/FFFFFF?text=Слайд+3" alt="Слайд 3" class="slide">
        </div>
        
        <button class="prev-btn">❮</button>
        <button class="next-btn">❯</button>
    </section>

    <!-- Весь JS будет здесь -->
    <script>
        // --- JS из slider.js (исправленный) ---
        document.addEventListener('DOMContentLoaded', function() {
          const sliderContainer = document.querySelector('.banner-slider');

          if (sliderContainer) {
              let slideIndex = 0;
              const slides = sliderContainer.querySelectorAll('.slide');
              const totalSlides = slides.length;

              function showSlide(index) {
                  slides.forEach(slide => slide.classList.remove('active'));
                  slides[index].classList.add('active');
              }

              function nextSlide() {
                  slideIndex = (slideIndex + 1) % totalSlides;
                  showSlide(slideIndex);
              }

              function prevSlide() {
                  slideIndex = (slideIndex - 1 + totalSlides) % totalSlides;
                  showSlide(slideIndex);
              }

              const nextBtn = sliderContainer.querySelector('.next-btn');
              const prevBtn = sliderContainer.querySelector('.prev-btn');

              if (nextBtn) nextBtn.addEventListener('click', nextSlide);
              if (prevBtn) prevBtn.addEventListener('click', prevSlide);

              // Запускаем автопрокрутку, если слайдов больше одного
              if (totalSlides > 1) {
                  setInterval(nextSlide, 3000);
              }

              // Показать первый слайд при загрузке
              if (totalSlides > 0) {
                  showSlide(slideIndex);
              }
          }
      });
    </script>

</body>
</html>
